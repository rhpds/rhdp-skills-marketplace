---
- name: Module 1 Setup — verify student namespace
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check student namespace exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ student_ns }}"
      register: r_ns

    - name: Report setup status
      ansible.builtin.debug:
        msg: "Namespace {{ student_ns }} is {{ 'ready' if r_ns.resources | length > 0 else 'not found' }}"
