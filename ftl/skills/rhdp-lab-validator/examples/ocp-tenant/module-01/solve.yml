---
- name: Module 1 Solve — create ConfigMap
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Create zt-test-config ConfigMap
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: zt-test-config
            namespace: "{{ student_ns }}"
          data:
            env: test
            solved-by: zerotouch
